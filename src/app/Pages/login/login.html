<div class="login-container">
  <div class="login-card">
    <div class="back-to-home">
      <a routerLink="/" class="back-link">
        <i class="pi pi-arrow-left"></i>
        <span>Volver al inicio</span>
      </a>
    </div>
    
    <div class="login-header">
      <div class="logo">
        <i class="pi pi-heart-fill"></i>
      </div>
      <h1>TeleAsistencia Sierra</h1>
      <p>Portal de Profesionales de Salud</p>
    </div>

    <div class="login-form">
      <div class="form-title">
        <span>Iniciar Sesión</span>
      </div>

      @if (error()) {
        <div class="error-message">
          <i class="pi pi-exclamation-circle"></i>
          <span>{{ error() }}</span>
        </div>
      }

      <div class="form-field">
        <label for="username">Usuario</label>
        <div class="input-wrapper">
          <i class="pi pi-user"></i>
          <input 
            type="text" 
            id="username"
            pInputText 
            [value]="username()"
            (input)="username.set($any($event.target).value)"
            placeholder="Ingresa tu usuario"
            autocomplete="username">
        </div>
      </div>

      <div class="form-field">
        <label for="password">Contraseña</label>
        <div class="input-wrapper">
          <i class="pi pi-lock"></i>
          <input 
            [type]="showPassword() ? 'text' : 'password'" 
            id="password"
            pInputText 
            [value]="password()"
            (input)="password.set($any($event.target).value)"
            placeholder="Ingresa tu contraseña"
            autocomplete="current-password">
          <i 
            class="pi eye-icon" 
            [class.pi-eye]="!showPassword()" 
            [class.pi-eye-slash]="showPassword()"
            (click)="showPassword.set(!showPassword())">
          </i>
        </div>
      </div>

      <div class="form-options">
        <label class="checkbox-wrapper">
          <input 
            type="checkbox" 
            [checked]="recordarme()"
            (change)="recordarme.set($any($event.target).checked)">
          <span>Recordarme</span>
        </label>
      </div>

      <button 
        pButton 
        label="Iniciar Sesión" 
        icon="pi pi-sign-in"
        [loading]="loading()"
        [disabled]="loading()"
        (click)="onLogin()"
        class="login-btn">
      </button>
    </div>

    <div class="login-footer">
      <p>Sistema autorizado para personal médico</p>
      <p class="version">v1.0.0</p>
    </div>
  </div>

  <div class="login-background">
    <div class="bg-pattern"></div>
  </div>
</div>
