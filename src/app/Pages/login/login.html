<div class="login-container">
  <div class="login-card">
    <div class="back-to-home">
      <a routerLink="/" class="back-link">
        <i class="pi pi-arrow-left"></i>
        <span>Volver al inicio</span>
      </a>
    </div>

    <div class="login-header">
      <div class="logo">
        <i class="pi pi-heart-fill"></i>
      </div>
      <h1>TeleAsistencia</h1>
      <p>Sistema de Telemedicina</p>
    </div>

    <div class="login-form">
      <div class="form-title">
        <span>Iniciar Sesion</span>
      </div>

      <p-message *ngIf="error()" severity="error" [text]="error()"></p-message>

      <div class="form-field">
        <label for="username">Usuario o Email</label>
        <div class="input-wrapper">
          <i class="pi pi-user"></i>
          <input
            type="text"
            id="username"
            pInputText
            [value]="username()"
            (input)="username.set($any($event.target).value)"
            placeholder="Ingresa tu usuario o email"
            autocomplete="username">
        </div>
      </div>

      <div class="form-field">
        <label for="password">Contrasena</label>
        <div class="input-wrapper">
          <i class="pi pi-lock"></i>
          <input
            [type]="showPassword() ? 'text' : 'password'"
            id="password"
            pInputText
            [value]="password()"
            (input)="password.set($any($event.target).value)"
            placeholder="Ingresa tu contrasena"
            autocomplete="current-password">
          <i
            class="pi eye-icon"
            [class.pi-eye]="!showPassword()"
            [class.pi-eye-slash]="showPassword()"
            (click)="showPassword.set(!showPassword())">
          </i>
        </div>
      </div>

      <div class="form-options">
        <label class="checkbox-wrapper">
          <input
            type="checkbox"
            [checked]="recordarme()"
            (change)="recordarme.set($any($event.target).checked)">
          <span>Recordarme</span>
        </label>
      </div>

      <button
        pButton
        label="Iniciar Sesion"
        [loading]="loading()"
        [disabled]="loading() || !username() || !password()"
        (click)="onLogin()"
        class="login-btn">
      </button>
    </div>

    <div class="login-footer">
      <p>Sistema autorizado para personal medico</p>
      <p class="version">v1.0.0</p>
    </div>
  </div>

  <div class="login-background">
    <div class="bg-pattern"></div>
    <div class="bg-element bg-1"></div>
    <div class="bg-element bg-2"></div>
    <div class="bg-element bg-3"></div>
  </div>
</div>
