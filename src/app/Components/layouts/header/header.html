<header class="header">
  <div class="header-left">
    <a routerLink="/" class="logo">
      <span class="logo-icon">
        <i class="pi pi-heart-fill"></i>
      </span>
      <span class="logo-text">TeleAsistencia</span>
      <span class="logo-badge">Sierra QR</span>
    </a>
  </div>

  <div class="header-center">
    @if (mostrarToggle) {
      <div class="status-indicator">
        <span class="status-dot"></span>
        <span class="status-text">Sistema activo</span>
        <span class="status-time">{{ currentTime() }}</span>
      </div>
    }
  </div>

  <div class="header-right">
    @if (mostrarToggle) {
      <div class="notification-wrapper">
        <button
          pButton
          type="button"
          icon="pi pi-bell"
          class="header-btn notification-btn"
          routerLink="/alertas"
          [pTooltip]="'Notificaciones (' + alertasSinLeer().length + ')'"
          tooltipPosition="bottom"
          aria-label="Ver notificaciones">
          @if (alertasSinLeer().length > 0) {
            <span class="notification-badge">{{ alertasSinLeer().length }}</span>
          }
        </button>
      </div>
    }

    <div class="user-menu">
      <p-avatar
        label="OP"
        shape="circle"
        size="large"
        styleClass="user-avatar">
      </p-avatar>
      @if (mostrarToggle) {
        <div class="user-info">
          <span class="user-name">Operador</span>
          <span class="user-role">En línea</span>
        </div>
        <i class="pi pi-chevron-down user-arrow"></i>
      }
    </div>
  </div>
</header>
