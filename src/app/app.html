<div class="app-container">
  <app-header 
    (menuToggle)="toggleSidebar()"
    (toggleSidebar)="toggleSidebarDesktop()"
    [mostrarToggle]="!esLanding()">
  </app-header>
  
  <div class="app-body">
    @if (!esLanding()) {
      <app-sidebar 
        [collapsed]="sidebarCollapsed()"
        (closeSidebar)="closeMobileMenu()"
        [class.mobile-open]="mobileMenuOpen()">
      </app-sidebar>
    }
    
    <main class="main-content" [class.full-width]="esLanding()">
      <router-outlet></router-outlet>
    </main>
  </div>
  
  @if (mobileMenuOpen() && !esLanding()) {
    <div class="overlay" (click)="closeMobileMenu()"></div>
  }
</div>
