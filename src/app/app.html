<div class="app-container">
  @if (!esLogin()) {
    <app-header 
      (menuToggle)="onMenuToggle()"
      [mostrarToggle]="!esLanding()">
    </app-header>
  }
  
  <div class="app-body">
    @if (!esLanding() && !esLogin()) {
      <app-sidebar 
        [collapsed]="esSidebarExpandido()"
        [mobileOpen]="mobileMenuOpen()"
        (closeSidebar)="closeMobileMenu()"
        (toggleCollapse)="onToggleCollapse()">
      </app-sidebar>
    }
    
    <main class="main-content" [class.full-width]="esLanding() || esLogin()">
      <router-outlet></router-outlet>
    </main>
  </div>
  
  @if (mobileMenuOpen() && !esLanding() && !esLogin()) {
    <div class="overlay" (click)="closeMobileMenu()"></div>
  }
</div>
